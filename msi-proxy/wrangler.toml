name = "msi-proxy"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Polls gol.gg for new MSI 2026 game data hourly during the broadcast window.
# 03:00-09:00 UTC = 8pm-2am PDT (Pacific during MSI in May).
# Adjust the hours range as the tournament schedule shifts.
# Manual /api/msi/refresh works any time for ad-hoc updates.
[triggers]
crons = ["0 3-9 * * *"]

# Create with: wrangler kv namespace create MSI_CACHE
# Then paste the id below.
[[kv_namespaces]]
binding = "MSI_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
