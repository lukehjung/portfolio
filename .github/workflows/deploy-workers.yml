name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
    paths:
      - 'tft-proxy/**'
      - 'msi-proxy/**'
      - 'wrangler.jsonc'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy-tft-proxy:
    if: contains(github.event.head_commit.modified, 'tft-proxy/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy TFT Proxy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'tft-proxy'
          # We explicitly use --config here to avoid Wrangler picking up the parent wrangler.jsonc
          command: deploy --config wrangler.toml

  deploy-msi-proxy:
    if: contains(github.event.head_commit.modified, 'msi-proxy/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy MSI Proxy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'msi-proxy'
          command: deploy --config wrangler.toml

  deploy-portfolio:
    if: contains(github.event.head_commit.modified, 'wrangler.jsonc') || contains(github.event.head_commit.modified, 'app/')
    runs-on: ubuntu-latest
    name: Deploy Portfolio (OpenNext)
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # The package.json 'deploy' script handles the opennextjs-cloudflare build
          command: run deploy
