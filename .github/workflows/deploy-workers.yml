name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
    paths:
      - 'tft-proxy/**'
      - 'msi-proxy/**'
      - 'wrangler.jsonc'
      - 'package.json'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      tft-proxy: ${{ steps.filter.outputs.tft-proxy }}
      msi-proxy: ${{ steps.filter.outputs.msi-proxy }}
      portfolio: ${{ steps.filter.outputs.portfolio }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On workflow_dispatch we treat everything as changed so manual deploys
          # always trigger every downstream job.
          filters: |
            tft-proxy:
              - 'tft-proxy/**'
            msi-proxy:
              - 'msi-proxy/**'
            portfolio:
              - 'app/**'
              - 'wrangler.jsonc'

  deploy-tft-proxy:
    needs: changes
    if: needs.changes.outputs.tft-proxy == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy TFT Proxy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'tft-proxy'
          # We explicitly use --config here to avoid Wrangler picking up the parent wrangler.jsonc
          command: deploy --config wrangler.toml

  deploy-msi-proxy:
    needs: changes
    if: needs.changes.outputs.msi-proxy == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy MSI Proxy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'msi-proxy'
          command: deploy --config wrangler.toml

  deploy-portfolio:
    needs: changes
    if: needs.changes.outputs.portfolio == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Portfolio (OpenNext)
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # The package.json 'deploy' script handles the opennextjs-cloudflare build
          command: run deploy
