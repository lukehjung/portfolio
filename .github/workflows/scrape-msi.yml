name: Scrape MSI data

on:
  schedule:
    # Hourly during the MSI broadcast window (8pm-2am PDT = 03:00-09:00 UTC).
    # Adjust as the tournament schedule shifts; manual runs via workflow_dispatch are always available.
    - cron: '0 3-9 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrape-msi
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper deps
        working-directory: scripts
        run: npm install --no-save cheerio@^1.0.0

      - name: Run scraper
        run: node scripts/scrape-msi.js

      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          set -euo pipefail
          curl -fsS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/msi:aggregate" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @app/pickems/msi_data.json \
            -o /tmp/cf-response.json
          echo "Cloudflare API response:"
          cat /tmp/cf-response.json
          if ! grep -q '"success":true' /tmp/cf-response.json; then
            echo "::error::KV write failed"
            exit 1
          fi
