name: Scrape MSI data

on:
  schedule:
    # Hourly during the MSI broadcast window (8pm-2am PDT = 03:00-09:00 UTC).
    # Adjust as the tournament schedule shifts; manual runs via workflow_dispatch are always available.
    - cron: '0 3-9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-msi
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper deps
        working-directory: scripts
        run: npm install --no-save cheerio@^1.0.0

      - name: Run scraper
        run: node scripts/scrape-msi.js

      - name: Commit updated data if changed
        run: |
          set -euo pipefail
          if git diff --quiet app/pickems/msi_data.json; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/pickems/msi_data.json
          git commit -m "chore(pickems): update msi_data.json from gol.gg"
          git push
